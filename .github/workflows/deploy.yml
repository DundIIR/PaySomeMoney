name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать два деплоя одновременно; недокаченный — отменить
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          # Базовый путь сайта; не задана — '/' (кастомный домен pay-some-money.ru)
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}

      # SPA-fallback: GitHub Pages отдаёт 404.html на любой несуществующий путь
      # (например /PaySomeMoney/success после редиректа с ЮKassa) — кладём туда
      # копию index.html, чтобы приложение загрузилось и роутер показал страницу
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
